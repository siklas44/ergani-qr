<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d6efd" />
  <title>Εργάνη QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --primary: #0d6efd;
      --primary-dark: #0a58ca;
      --danger: #dc3545;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 18px 16px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    header .subtitle {
      font-size: 0.8rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    main {
      flex: 1;
      padding: 16px;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    .search-box {
      position: relative;
      margin-bottom: 12px;
    }
    .search-box input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
    }
    .search-box::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");
      background-repeat: no-repeat;
      background-size: contain;
    }

    .add-btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background 0.15s, transform 0.05s;
      margin-bottom: 16px;
    }
    .add-btn:active { background: var(--primary-dark); transform: scale(0.99); }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .employee {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.05s, border-color 0.15s;
      user-select: none;
    }
    .employee:active { transform: scale(0.99); }
    .employee:hover { border-color: var(--primary); }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      flex-shrink: 0;
      margin-right: 12px;
    }
    .employee-info { flex: 1; min-width: 0; }
    .employee-name {
      font-weight: 600;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .employee-code {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 8px;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .delete-btn:active, .delete-btn:hover { background: #fee2e2; color: var(--danger); }

    .empty {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
    }
    .empty svg { width: 64px; height: 64px; opacity: 0.4; margin-bottom: 12px; }
    .empty p { font-size: 0.95rem; }

    /* Modal — add employee */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }
    .modal.open { display: flex; }
    @media (min-width: 600px) {
      .modal { align-items: center; }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content {
      background: var(--surface);
      width: 100%;
      max-width: 500px;
      border-radius: 16px 16px 0 0;
      padding: 20px;
      animation: slideUp 0.25s ease;
    }
    @media (min-width: 600px) {
      .modal-content { border-radius: 16px; }
    }
    @keyframes slideUp { from { transform: translateY(30px); } to { transform: translateY(0); } }
    .modal h2 {
      font-size: 1.15rem;
      margin-bottom: 16px;
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .btn {
      flex: 1;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:active { background: var(--primary-dark); }
    .btn-secondary { background: #e5e7eb; color: var(--text); }
    .btn-secondary:active { background: #d1d5db; }

    /* QR fullscreen */
    .qr-screen {
      position: fixed;
      inset: 0;
      background: #fff;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    .qr-screen.open { display: flex; }
    .qr-close {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 12px);
      right: 16px;
      background: rgba(0,0,0,0.05);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 1.5rem;
      line-height: 1;
    }
    .qr-close:active { background: rgba(0,0,0,0.1); }
    .qr-name {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
      max-width: 90%;
    }
    #qrcode {
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    #qrcode img, #qrcode canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .qr-code-text {
      margin-top: 20px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      word-break: break-all;
      max-width: 90%;
    }

    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1f2937;
      color: #fff;
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 0.9rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      z-index: 300;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <h1>Εργάνη QR</h1>
    <div class="subtitle">Διαχείριση QR εργαζομένων</div>
  </header>

  <main>
    <div class="search-box">
      <input type="search" id="search" placeholder="Αναζήτηση εργαζόμενου..." autocomplete="off" />
    </div>
    <button class="add-btn" id="addBtn">+ Προσθήκη Εργαζόμενου</button>
    <div class="list" id="list"></div>
  </main>

  <!-- Add modal -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <h2>Νέος Εργαζόμενος</h2>
      <form id="addForm">
        <div class="form-group">
          <label for="name">Ονοματεπώνυμο</label>
          <input type="text" id="name" required maxlength="100" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="code">Κωδικός QR (Εργάνη)</label>
          <input type="text" id="code" required maxlength="500" autocomplete="off" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Άκυρο</button>
          <button type="submit" class="btn btn-primary">Αποθήκευση</button>
        </div>
      </form>
    </div>
  </div>

  <!-- QR fullscreen -->
  <div class="qr-screen" id="qrScreen">
    <button class="qr-close" id="qrClose" aria-label="Κλείσιμο">×</button>
    <div class="qr-name" id="qrName"></div>
    <div id="qrcode"></div>
    <div class="qr-code-text" id="qrCodeText"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "ergani-qr-employees";

    const $ = (id) => document.getElementById(id);
    const listEl = $("list");
    const searchEl = $("search");
    const addBtn = $("addBtn");
    const addModal = $("addModal");
    const addForm = $("addForm");
    const cancelBtn = $("cancelBtn");
    const nameInput = $("name");
    const codeInput = $("code");
    const qrScreen = $("qrScreen");
    const qrClose = $("qrClose");
    const qrNameEl = $("qrName");
    const qrCodeEl = $("qrcode");
    const qrCodeText = $("qrCodeText");
    const toastEl = $("toast");

    let employees = load();
    let qrInstance = null;

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const data = JSON.parse(raw);
        return Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(employees));
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function initials(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function render() {
      const q = searchEl.value.trim().toLowerCase();
      const filtered = q
        ? employees.filter((e) => e.name.toLowerCase().includes(q) || e.code.toLowerCase().includes(q))
        : employees;

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="empty">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <line x1="19" y1="8" x2="19" y2="14"/>
              <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
            <p>${employees.length === 0 ? "Δεν υπάρχουν εργαζόμενοι.<br>Πατήστε «Προσθήκη» για να ξεκινήσετε." : "Δεν βρέθηκαν αποτελέσματα."}</p>
          </div>
        `;
        return;
      }

      listEl.innerHTML = filtered
        .map(
          (e) => `
        <div class="employee" data-id="${e.id}">
          <div class="avatar">${escapeHtml(initials(e.name))}</div>
          <div class="employee-info">
            <div class="employee-name">${escapeHtml(e.name)}</div>
            <div class="employee-code">${escapeHtml(e.code)}</div>
          </div>
          <button class="delete-btn" data-del="${e.id}" aria-label="Διαγραφή">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/>
              <path d="M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      `
        )
        .join("");
    }

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("show"), 2000);
    }

    function openAddModal() {
      addForm.reset();
      addModal.classList.add("open");
      setTimeout(() => nameInput.focus(), 100);
    }
    function closeAddModal() {
      addModal.classList.remove("open");
    }

    function openQr(employee) {
      qrNameEl.textContent = employee.name;
      qrCodeText.textContent = employee.code;
      qrCodeEl.innerHTML = "";

      const size = Math.min(window.innerWidth - 80, window.innerHeight - 280, 360);
      qrInstance = new QRCode(qrCodeEl, {
        text: employee.code,
        width: size,
        height: size,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M,
      });

      qrScreen.classList.add("open");
    }
    function closeQr() {
      qrScreen.classList.remove("open");
      qrCodeEl.innerHTML = "";
      qrInstance = null;
    }

    function addEmployee(name, code) {
      employees.unshift({ id: uid(), name: name.trim(), code: code.trim() });
      save();
      render();
      showToast("Ο εργαζόμενος προστέθηκε");
    }

    function deleteEmployee(id) {
      const emp = employees.find((e) => e.id === id);
      if (!emp) return;
      if (!confirm(`Διαγραφή του εργαζόμενου «${emp.name}»;`)) return;
      employees = employees.filter((e) => e.id !== id);
      save();
      render();
      showToast("Ο εργαζόμενος διαγράφηκε");
    }

    addBtn.addEventListener("click", openAddModal);
    cancelBtn.addEventListener("click", closeAddModal);
    addModal.addEventListener("click", (e) => {
      if (e.target === addModal) closeAddModal();
    });

    addForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const code = codeInput.value.trim();
      if (!name || !code) return;
      addEmployee(name, code);
      closeAddModal();
    });

    searchEl.addEventListener("input", render);

    listEl.addEventListener("click", (e) => {
      const delBtn = e.target.closest("[data-del]");
      if (delBtn) {
        e.stopPropagation();
        deleteEmployee(delBtn.dataset.del);
        return;
      }
      const card = e.target.closest(".employee");
      if (card) {
        const emp = employees.find((x) => x.id === card.dataset.id);
        if (emp) openQr(emp);
      }
    });

    qrClose.addEventListener("click", closeQr);
    qrScreen.addEventListener("click", (e) => {
      if (e.target === qrScreen) closeQr();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (qrScreen.classList.contains("open")) closeQr();
        else if (addModal.classList.contains("open")) closeAddModal();
      }
    });

    render();
  </script>
</body>
</html>
