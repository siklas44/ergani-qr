<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logo Preview — Εργάνη QR</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f4f6f9;
      color: #1f2937;
      padding: 24px;
      margin: 0;
    }
    h1 { font-size: 1.4rem; margin: 0 0 6px; color: #0d6efd; }
    p.intro { color: #6b7280; margin: 0 0 24px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1100px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }
    .card h2 {
      font-size: 1rem;
      color: #6b7280;
      font-weight: 500;
      margin: 0 0 14px;
    }
    .sizes {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .sizes div { text-align: center; font-size: 0.7rem; color: #9ca3af; }
    .sizes img { display: block; margin-bottom: 6px; border-radius: 12px; }
    .big   { width: 160px; height: 160px; }
    .med   { width: 96px;  height: 96px;  border-radius: 18px; }
    .small { width: 56px;  height: 56px;  border-radius: 12px; }
  </style>
</head>
<body>
  <h1>Λογότυπα — Εργάνη QR</h1>
  <p class="intro">3 επιλογές. Δες πώς θα φαίνονται σε διαφορετικά μεγέθη και πες μου ποια προτιμάς.</p>

  <div class="grid">
    <div class="card">
      <h2>1. Μονόγραμμα ΕQ</h2>
      <div class="sizes">
        <div><img src="logo-1-monogram.svg" class="big">big</div>
        <div><img src="logo-1-monogram.svg" class="med">med</div>
        <div><img src="logo-1-monogram.svg" class="small">small</div>
      </div>
    </div>
    <div class="card">
      <h2>2. QR Pattern</h2>
      <div class="sizes">
        <div><img src="logo-2-qr-pattern.svg" class="big">big</div>
        <div><img src="logo-2-qr-pattern.svg" class="med">med</div>
        <div><img src="logo-2-qr-pattern.svg" class="small">small</div>
      </div>
    </div>
    <div class="card">
      <h2>3. ID Card με QR</h2>
      <div class="sizes">
        <div><img src="logo-3-card-badge.svg" class="big">big</div>
        <div><img src="logo-3-card-badge.svg" class="med">med</div>
        <div><img src="logo-3-card-badge.svg" class="small">small</div>
      </div>
    </div>
  </div>
</body>
</html>
