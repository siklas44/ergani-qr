<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a58ca"/>
      <stop offset="100%" stop-color="#0d6efd"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg3)"/>
  <!-- ID card -->
  <rect x="106" y="146" width="300" height="220" rx="22" fill="#ffffff"/>
  <!-- Avatar circle -->
  <circle cx="180" cy="220" r="34" fill="#0d6efd"/>
  <!-- Name lines -->
  <rect x="232" y="200" width="146" height="14" rx="6" fill="#0d6efd"/>
  <rect x="232" y="226" width="110" height="10" rx="5" fill="#cbd5e1"/>
  <!-- QR-like square at the bottom-right of card -->
  <g transform="translate(298,272)">
    <rect width="92" height="92" rx="8" fill="#0d6efd"/>
    <g fill="#ffffff">
      <rect x="10" y="10" width="22" height="22" rx="3"/>
      <rect x="60" y="10" width="22" height="22" rx="3"/>
      <rect x="10" y="60" width="22" height="22" rx="3"/>
      <rect x="40" y="40" width="12" height="12"/>
      <rect x="60" y="60" width="22" height="22" rx="3"/>
    </g>
    <g fill="#0d6efd">
      <rect x="16" y="16" width="10" height="10"/>
      <rect x="66" y="16" width="10" height="10"/>
      <rect x="16" y="66" width="10" height="10"/>
      <rect x="66" y="66" width="10" height="10"/>
    </g>
  </g>
  <!-- Smaller line under avatar -->
  <rect x="124" y="278" width="160" height="8" rx="4" fill="#cbd5e1"/>
  <rect x="124" y="298" width="120" height="8" rx="4" fill="#cbd5e1"/>
  <!-- App name below -->
  <text x="256" y="430"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#ffffff" text-anchor="middle"
        letter-spacing="2">ΕΡΓΑΝΗ QR</text>
</svg>
